name: Deploy FastAPI and Batch Image
on:
  push:
    branches: [ main ]

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      ECR_REGISTRY: ""  # set after login step below
      ECR_REPOSITORY: notebook2rest
      # NOTEBOOK_NAME: notebook
    steps:
      - name: Checkout Code  
        uses: actions/checkout@v4

      - name: Configure AWS Credentials  
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_ROLE_ARN }}
          aws-region: eu-west-1
      
      - name: Verify Identity  
        run: aws sts get-caller-identity

        # --- PART 1: BUILD, PUSH AND REGISTER FOR EACH NOTEBOOK ---
      - name: Build, Push and Register Notebooks
        run: |
          cd vl-laserfarm

          for notebook in *.ipynb; do
            NOTEBOOK_NAME=$(basename "$notebook" .ipynb)
            IMAGE_URI="$ECR_REGISTRY/$ECR_REPOSITORY:$NOTEBOOK_NAME"

            # echo "Processing notebook: $NOTEBOOK_NAME"

            # Build image
            docker build \
              -t $IMAGE_URI \
              -f ../docker/Dockerfile \
              ../docker \
              --build-arg NOTEBOOK_NAME=$NOTEBOOK_NAME

            # Push image
            docker push $IMAGE_URI

            # Register AWS Batch job definition
            aws batch register-job-definition \
              --job-definition-name "Notebook2REST-$NOTEBOOK_NAME" \
              --type container \
              --cli-input-json "$(jq --arg img "$IMAGE_URI" \
                '.containerProperties.image = $img' \
                ../.github/batch/job-definition-template.json)"

          done
          cd ..

      # --- PART 3: SYNC FASTAPI TO LAMBDA ---
      - name: Zip and Deploy Lambda
        run: |
          cd api_repo
          pip install -r requirements.txt
          python3 pipeline.py
          mv paramdump.json ..
          cd ..
          (cd lambda-build && zip -r ../function.zip .) && (cd lambda && zip -r ../function.zip .) && zip function.zip app.py paramdump.json
          aws lambda update-function-code \
            --function-name notebook2rest \
            --zip-file fileb://function.zip
