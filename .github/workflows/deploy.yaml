name: Deploy FastAPI and Batch Image
on:
  push:
    branches: [ main ]

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      ECR_REGISTRY: ""  # set after login step below
      ECR_REPOSITORY: notebook2rest
      NOTEBOOK_NAME: notebook
    steps:
      - name: Checkout Code  
        uses: actions/checkout@v4

      - name: Configure AWS Credentials  
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_ROLE_ARN }}
          aws-region: eu-west-1
      
      - name: Verify Identity  
        run: aws sts get-caller-identity

      # --- PART 1: BUILD & PUSH NOTEBOOK IMAGE ---
      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set ECR Registry
        run: echo "ECR_REGISTRY=${{ steps.login-ecr.outputs.registry }}" >> $GITHUB_ENV

      - name: Build, Tag, and Push Image to ECR
        run: |
          docker build \
            -t $ECR_REGISTRY/$ECR_REPOSITORY:$NOTEBOOK_NAME \
            -f ./docker/Dockerfile \
            ./docker
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$NOTEBOOK_NAME

      # --- PART 2: REGISTER JOB DEFINITION ---
      - name: Register Batch Job Definition
        run: |
          IMAGE_URI="$ECR_REGISTRY/$ECR_REPOSITORY:$NOTEBOOK_NAME"
          aws batch register-job-definition \
            --job-definition-name "Notebook2REST-$NOTEBOOK_NAME" \
            --type container \
            --cli-input-json "$(jq --arg img "$IMAGE_URI" \
              '.containerProperties.image = $img' \
              .github/batch/job-definition-template.json)"

      # --- PART 3: SYNC FASTAPI TO LAMBDA ---
      - name: Zip and Deploy Lambda
        run: |
          cd api_repo
          pip install -r requirements.txt
          python3 pipeline.py
          mv paramdump.json ..
          cd ..
          (cd lambda-build && zip -r ../function.zip .) && (cd lambda && zip -r ../function.zip .) && zip function.zip app.py paramdump.json
          aws lambda update-function-code \
            --function-name notebook2rest \
            --zip-file fileb://function.zip
